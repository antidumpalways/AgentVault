<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d9ff" />
      <stop offset="100%" stop-color="#2196f3" />
    </linearGradient>
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Deep Dark Background (matches body bg) -->
  <rect width="800" height="800" fill="#050505" />

  <!-- Logo Mark -->
  <g transform="translate(400, 350)">
    <!-- Glow Effect Behind -->
    <rect x="-60" y="-120" width="120" height="240" rx="24" fill="url(#brand-grad)" opacity="0.3" filter="url(#soft-glow)"/>

    <!-- The Vault Door -->
    <path d="M-70,-100 C-70,-120 -50,-130 -30,-130 L40,-130 C45,-130 50,-125 50,-120 L50,100 C50,120 30,130 10,130 L-60,130 C-65,130 -70,125 -70,120 Z"
          fill="#0a0a0a" stroke="url(#brand-grad)" stroke-width="4.5"/>

    <!-- Encrypted Data Lines (The Memory) -->
    <line x1="-30" y1="-60" x2="10" y2="-60" stroke="#00d9ff" stroke-width="4" stroke-linecap="round"/>
    <line x1="-30" y1="-30" x2="20" y2="-30" stroke="#2196f3" stroke-width="4" stroke-linecap="round"/>
    <line x1="-30" y1="0" x2="0" y2="0" stroke="#00d9ff" stroke-width="4" stroke-linecap="round"/>
    <line x1="-30" y1="30" x2="15" y2="30" stroke="#2196f3" stroke-width="4" stroke-linecap="round"/>

    <!-- Threshold Lock Point -->
    <circle cx="20" cy="70" r="8" fill="#00d9ff" filter="url(#soft-glow)"/>
  </g>

  <!-- Typography -->
  <text x="400" y="630" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="56" letter-spacing="2" fill="#f2ede6">
    Agent<tspan fill="#00d9ff">Vault</tspan>
  </text>
</svg>
